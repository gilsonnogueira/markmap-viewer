<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Markmap Viewer Arquitetura</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'JetBrains Mono', monospace; background: #020617; color: white; padding: 2rem; }
    .diagram-container { background: rgba(15, 23, 42, 0.5); border: 1px solid #1e293b; border-radius: 1rem; padding: 2rem; }
    svg { width: 100%; height: auto; }
  </style>
</head>
<body>
  <div class="diagram-container">
    <svg viewBox="0 0 800 400">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
        </marker>
      </defs>
      <!-- Usuário -->
      <rect x="50" y="150" width="120" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="2"/>
      <text x="110" y="185" fill="white" text-anchor="middle" font-weight="600">Usuário</text>
      
      <!-- SPA -->
      <rect x="250" y="150" width="200" height="80" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="2"/>
      <text x="350" y="185" fill="white" text-anchor="middle" font-weight="600">Markmap Viewer (SPA)</text>
      <text x="350" y="205" fill="#94a3b8" font-size="12" text-anchor="middle">HTML/JS + D3.js</text>

      <!-- Drive -->
      <rect x="550" y="100" width="200" height="180" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="2"/>
      <text x="650" y="130" fill="white" text-anchor="middle" font-weight="600">Google Drive</text>
      <text x="650" y="160" fill="#94a3b8" font-size="12" text-anchor="middle">• API v3 (REST)</text>
      <text x="650" y="180" fill="#94a3b8" font-size="12" text-anchor="middle">• Auth (GIS)</text>
      <text x="650" y="200" fill="#94a3b8" font-size="12" text-anchor="middle">• .settings.json</text>
      <text x="650" y="220" fill="#94a3b8" font-size="12" text-anchor="middle">• Mapas (.md)</text>

      <!-- Conexões -->
      <line x1="170" y1="180" x2="248" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="450" y1="170" x2="548" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="450" y1="210" x2="548" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    </svg>
  </div>
</body>
</html>
